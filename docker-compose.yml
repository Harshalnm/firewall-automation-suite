version: '3.8'

services:
  # Layer 3: DNS & Tracker Blocking
  pihole:
    image: pihole/pihole:latest
    hostname: pihole
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp"
      - "80:80/tcp"
      - "443:443/tcp"
    environment:
      TZ: 'UTC'
      WEBPASSWORD: '${PIHOLE_PASSWORD}'
      QUERY_LOGGING: 'true'
      FTLCONF_MAXLOGSIZEKB: '10000'
    volumes:
      - './volumes/pihole/etc-pihole/:/etc/pihole/'
      - './volumes/pihole/etc-dnsmasq.d/:/etc/dnsmasq.d/'
      - './configs/blocklists/:/etc/blocklists/'
    restart: unless-stopped
    networks:
      - firewall-net
    cap_add:
      - NET_ADMIN
    healthcheck:
      test: ["CMD", "dig", "@localhost", "google.com"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Layer 2: IDS/IPS - Snort
  snort:
    image: snort-ips:latest
    hostname: snort
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - './configs/snort/snort.conf:/etc/snort/snort.conf:ro'
      - './configs/snort/rules/:/etc/snort/rules/:ro'
      - './volumes/snort/logs/:/var/log/snort/'
    environment:
      SNORT_MODE: 'IPS'
      HOME_NET: '192.168.1.0/24'
    restart: unless-stopped
    networks:
      - firewall-net
    depends_on:
      - pihole
    healthcheck:
      test: ["CMD", "snort", "-V"]
      interval: 60s
      timeout: 10s
      retries: 3

  # Layer 4: VPN - WireGuard
  wireguard:
    image: linuxserver/wireguard:latest
    hostname: wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      TZ: 'UTC'
      SERVERPORT: 51820
      PEERS: 'home-devices'
    volumes:
      - './volumes/wireguard/config/:/config/'
      - '/lib/modules:/lib/modules:ro'
    ports:
      - "51820:51820/udp"
    restart: unless-stopped
    networks:
      - firewall-net
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=1

  # Monitoring: Prometheus
  prometheus:
    image: prom/prometheus:latest
    hostname: prometheus
    volumes:
      - './configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro'
      - './volumes/prometheus/data/:/prometheus/'
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - firewall-net

  # Monitoring: Grafana
  grafana:
    image: grafana/grafana:latest
    hostname: grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: '${GRAFANA_PASSWORD}'
      GF_INSTALL_PLUGINS: 'grafana-piechart-panel'
    volumes:
      - './volumes/grafana/data/:/var/lib/grafana/'
      - './configs/grafana/dashboards/:/etc/grafana/provisioning/dashboards/:ro'
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - firewall-net
    depends_on:
      - prometheus

  # Alert Manager
  alertmanager:
    image: prom/alertmanager:latest
    hostname: alertmanager
    volumes:
      - './configs/alertmanager.yml:/etc/alertmanager/config.yml:ro'
      - './volumes/alertmanager/data/:/alertmanager/'
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - firewall-net

  # Custom Alert Service
  alert-service:
    build: ./services/alert-service
    hostname: alert-service
    environment:
      TELEGRAM_BOT_TOKEN: '${TELEGRAM_BOT_TOKEN}'
      TELEGRAM_CHAT_ID: '${TELEGRAM_CHAT_ID}'
      SMTP_SERVER: '${SMTP_SERVER}'
      SMTP_USERNAME: '${SMTP_USERNAME}'
      SMTP_PASSWORD: '${SMTP_PASSWORD}'
    volumes:
      - './scripts/alerting/:/app/scripts/'
      - './volumes/alert-service/logs/:/var/log/alerts/'
    restart: unless-stopped
    networks:
      - firewall-net
    depends_on:
      - pihole
      - snort

  # Device Monitor
  device-monitor:
    build: ./services/device-monitor
    hostname: device-monitor
    cap_add:
      - NET_ADMIN
    environment:
      HOME_NETWORK: '192.168.1.0/24'
      ROUTER_IP: '${ROUTER_IP}'
    volumes:
      - './scripts/router/:/app/scripts/'
      - './volumes/device-monitor/data/:/data/'
    restart: unless-stopped
    networks:
      - firewall-net

networks:
  firewall-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  pihole-data:
  snort-logs:
  prometheus-data:
  grafana-data:
  wireguard-config:
